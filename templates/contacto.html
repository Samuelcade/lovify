<body>
<header>
        <div class="logo">

    </div>
    </header>

    <div class="contacto">
    <h1>Contacto</h1>
    <p>Si tienes alguna pregunta o necesitas más información, no dudes en contactarnos. Estamos aquí para ayudarte.</p>
    </div>
    <form action="/enviar_contacto" method="POST" class="form">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="telefono">Teléfono:</label>
        <input type="number" id="telefono" name="telefono" required>

        <label for="mensaje">Mensaje:</label>
        <textarea id="mensaje" name="mensaje" class="form-textarea" rows="8" required></textarea>

        <button type="submit" class="formbutton">Enviar</button>
    </form>

 <footer>
